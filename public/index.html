<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>BahlilHub — IoT Dashboard</title>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --card:       #1c2333;
  --border:     #30363d;
  --border-sub: #21262d;
  --accent:     #2f81f7;
  --accent-dim: rgba(47,129,247,0.12);
  --green:      #3fb950;
  --green-dim:  rgba(63,185,80,0.12);
  --yellow:     #d29922;
  --yellow-dim: rgba(210,153,34,0.12);
  --red:        #f85149;
  --red-dim:    rgba(248,81,73,0.12);
  --text:       #e6edf3;
  --text-sub:   #8b949e;
  --text-dim:   #484f58;
  --mono:       'JetBrains Mono', monospace;
  --sans:       'Inter', sans-serif;
  --radius:     8px;
  --sidebar-w:  260px;
  --header-h:   56px;
}

html { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 200;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
  flex-shrink: 0;
}

.logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon svg { width: 16px; height: 16px; }

.header-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

.header-title {
  font-size: 14px;
  color: var(--text-sub);
  font-weight: 400;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--card);
  transition: all 0.2s;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
  transition: background 0.3s;
}

.status-dot.on { background: var(--green); box-shadow: 0 0 0 2px var(--green-dim); }
.status-pill.on { border-color: rgba(63,185,80,0.3); }

.msg-badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--mono);
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(47,129,247,0.25);
}

/* hamburger */
.hamburger {
  display: none;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px;
  cursor: pointer;
  color: var(--text-sub);
  flex-shrink: 0;
}
.hamburger svg { display: block; }

/* ── LAYOUT ── */
.layout {
  display: flex;
  padding-top: var(--header-h);
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 100;
  transition: transform 0.25s ease;
}

.sidebar-inner {
  flex: 1;
  overflow-y: auto;
  padding: 12px 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-section {
  margin-bottom: 4px;
}

.sidebar-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 8px 8px 4px;
}

.sidebar-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius);
  border: none;
  background: transparent;
  color: var(--text-sub);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}

.sidebar-btn:hover { background: var(--card); color: var(--text); }

.sidebar-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
}

.sidebar-btn svg { flex-shrink: 0; width: 16px; height: 16px; }

.sidebar-btn-meta {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

.sidebar-btn.active .sidebar-btn-meta { color: var(--accent); opacity: 0.7; }

.sidebar-live {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  animation: blink 2s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.sidebar-empty {
  padding: 24px 12px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.6;
}

.sidebar-footer {
  border-top: 1px solid var(--border);
  padding: 12px;
}

.sidebar-footer-stat {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-dim);
  padding: 4px 0;
}

.sidebar-footer-stat span:last-child {
  font-family: var(--mono);
  color: var(--text-sub);
}

/* overlay for mobile */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
  -webkit-backdrop-filter: blur(2px);
  backdrop-filter: blur(2px);
}

/* ── MAIN ── */
main {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 20px;
  min-width: 0;
}

/* ── EMPTY STATE ── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  text-align: center;
  gap: 12px;
}

.empty-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
}

.empty-icon svg { width: 28px; height: 28px; color: var(--text-dim); }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text-sub); }
.empty-sub { font-size: 13px; color: var(--text-dim); max-width: 280px; line-height: 1.5; }

/* ── PAGE HEADER ── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 12px;
  flex-wrap: wrap;
}

.page-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}

.page-sub {
  font-size: 12px;
  color: var(--text-dim);
  font-family: var(--mono);
  margin-top: 2px;
}

.topic-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-family: var(--mono);
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(47,129,247,0.25);
}

/* ── GRID ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

/* ── CARDS ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.stat-card {
  padding: 16px;
}

.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 500;
  line-height: 1;
  color: var(--accent);
}

.stat-value.green { color: var(--green); }
.stat-value.yellow { color: var(--yellow); }
.stat-value.text { font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--text); }

.stat-meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
}

/* reading cards */
.readings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.reading-card {
  padding: 20px;
  position: relative;
}

.reading-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
}

.reading-card.temp::after { background: var(--yellow); }
.reading-card.humid::after { background: var(--accent); }
.reading-card.other::after { background: var(--green); }

.reading-key {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.reading-val {
  font-family: var(--mono);
  font-size: 40px;
  font-weight: 500;
  line-height: 1;
  color: var(--yellow);
}

.reading-card.humid .reading-val { color: var(--accent); }
.reading-card.other .reading-val { color: var(--green); }

.reading-unit {
  font-size: 14px;
  color: var(--text-sub);
  margin-top: 4px;
  font-weight: 500;
}

.reading-time {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--mono);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-sub);
}

/* chart */
.chart-card { padding: 20px; margin-bottom: 16px; }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.chart-wrap { position: relative; height: 220px; }

/* log */
.log-card { padding: 20px; }

.log-body {
  background: var(--bg);
  border: 1px solid var(--border-sub);
  border-radius: var(--radius);
  padding: 12px;
  height: 180px;
  overflow-y: auto;
  font-family: var(--mono);
  font-size: 11px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.log-body::-webkit-scrollbar { width: 4px; }
.log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.log-row {
  display: grid;
  grid-template-columns: 64px 140px 1fr;
  gap: 12px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border-sub);
  animation: fadeIn 0.2s ease;
}

.log-row:last-child { border-bottom: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-2px); }
  to   { opacity: 1; transform: translateY(0); }
}

.log-time { color: var(--text-dim); }
.log-topic { color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-msg { color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.log-empty { color: var(--text-dim); text-align: center; padding: 24px 0; }

/* btn */
.btn-sm {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--sans);
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.15s;
}

.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 280px; }

  .hamburger { display: flex; }
  .header-title { display: none; }

  .sidebar {
    transform: translateX(-100%);
    box-shadow: 4px 0 24px rgba(0,0,0,0.4);
  }

  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }

  main { margin-left: 0; padding: 16px; }

  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .readings-grid { grid-template-columns: 1fr 1fr; }

  .reading-val { font-size: 32px; }
  .stat-value { font-size: 24px; }

  .log-row { grid-template-columns: 56px 1fr; }
  .log-msg { display: none; }

  .page-title { font-size: 16px; }
}

@media (max-width: 400px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .readings-grid { grid-template-columns: 1fr; }
  main { padding: 12px; }
}

/* safe area for iOS */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .sidebar { padding-bottom: env(safe-area-inset-bottom); }
  main { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<header>
  <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <div class="header-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    BahlilHub
  </div>

  <div class="header-divider"></div>
  <span class="header-title">IoT Monitoring Dashboard</span>

  <div class="header-right">
    <div class="status-pill" id="statusPill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Offline</span>
    </div>
    <div class="msg-badge" id="msgBadge">0 msg</div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-section">
        <button class="sidebar-btn active" id="allTopicsBtn" onclick="selectAll()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Semua Topic
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Topic Aktif</div>
        <div id="topicList">
          <div class="sidebar-empty">Menunggu data masuk...</div>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-footer-stat">
        <span>Total Topic</span>
        <span id="footerTopics">0</span>
      </div>
      <div class="sidebar-footer-stat">
        <span>Total Pesan</span>
        <span id="footerMsgs">0</span>
      </div>
      <div class="sidebar-footer-stat">
        <span>Broker</span>
        <span id="footerBroker">—</span>
      </div>
    </div>
  </aside>

  <main id="mainContent">
    <div class="empty">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8.111 16.404a5.5 5.5 0 0 1 7.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.14 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/>
        </svg>
      </div>
      <div class="empty-title">Menunggu Koneksi</div>
      <div class="empty-sub">Pastikan ESP8266 sudah terhubung dan mengirim data ke broker MQTT.</div>
    </div>
  </main>
</div>

<script>
const socket = io();
let allData = {};
let topics = [];
let totalMsgs = 0;
let selectedTopic = null;
let logEntries = [];
let charts = {};

// ── Socket ──
socket.on('connect', () => {
  document.getElementById('statusDot').classList.add('on');
  document.getElementById('statusPill').classList.add('on');
  document.getElementById('statusText').textContent = 'Online';
  document.getElementById('footerBroker').textContent = 'Connected';
});

socket.on('disconnect', () => {
  document.getElementById('statusDot').classList.remove('on');
  document.getElementById('statusPill').classList.remove('on');
  document.getElementById('statusText').textContent = 'Offline';
  document.getElementById('footerBroker').textContent = 'Disconnected';
});

socket.on('sensor-data', (p) => {
  allData = p.allTopics;
  topics  = p.topicsList;
  totalMsgs = p.messageCount;

  document.getElementById('msgBadge').textContent = totalMsgs + ' msg';
  document.getElementById('footerTopics').textContent = topics.length;
  document.getElementById('footerMsgs').textContent = totalMsgs;

  renderSidebar();
  addLog(p.topic, p.data);

  if (selectedTopic === null) renderAll();
  else if (selectedTopic === p.topic) renderTopic(p.topic);
});

// ── Sidebar ──
function renderSidebar() {
  const list = document.getElementById('topicList');
  if (!topics.length) {
    list.innerHTML = '<div class="sidebar-empty">Menunggu data masuk...</div>';
    return;
  }
  list.innerHTML = topics.map(t => {
    const d = allData[t] || [];
    const active = selectedTopic === t;
    return `<button class="sidebar-btn ${active ? 'active' : ''}" onclick="selectTopic('${t}')">
      ${topicIcon(t)}
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t}</span>
      <span class="sidebar-live"></span>
      <span class="sidebar-btn-meta">${d.length}</span>
    </button>`;
  }).join('');
}

function topicIcon(t) {
  const k = t.toLowerCase();
  if (k.includes('suhu') || k.includes('temp') || k.includes('dht'))
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>`;
  if (k.includes('humid') || k.includes('kelembapan'))
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>`;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`;
}

// ── Select ──
function selectAll() {
  selectedTopic = null;
  document.getElementById('allTopicsBtn').classList.add('active');
  closeSidebar();
  renderSidebar();
  renderAll();
}

function selectTopic(t) {
  selectedTopic = t;
  document.getElementById('allTopicsBtn').classList.remove('active');
  closeSidebar();
  renderSidebar();
  renderTopic(t);
}

// ── Render All ──
function renderAll() {
  const main = document.getElementById('mainContent');
  if (!topics.length) {
    main.innerHTML = emptyHTML();
    return;
  }

  const statsHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Overview</div>
        <div class="page-sub">Semua topic aktif</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="card stat-card">
        <div class="stat-label">Topic Aktif</div>
        <div class="stat-value">${topics.length}</div>
        <div class="stat-meta">topic terdeteksi</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Total Pesan</div>
        <div class="stat-value green">${totalMsgs}</div>
        <div class="stat-meta">pesan diterima</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">Status Broker</div>
        <div class="stat-value text" style="color:var(--green)">Online</div>
        <div class="stat-meta">HiveMQ Cloud</div>
      </div>
    </div>`;

  let readingsHTML = '<div class="readings-grid">';
  for (const t of topics) {
    const d = allData[t] || [];
    if (!d.length) continue;
    const latest = d[d.length - 1];
    const numKeys = numericKeys(latest);
    for (const k of numKeys) {
      const v = parseFloat(latest[k]);
      const { cls, unit } = valueMeta(k, v);
      readingsHTML += `
        <div class="card reading-card ${cls}">
          <div class="reading-key">${t} / ${k}</div>
          <div class="reading-val">${v.toFixed(1)}</div>
          <div class="reading-unit">${unit}</div>
          <div class="reading-time">${latest.received_at || '—'}</div>
        </div>`;
    }
  }
  readingsHTML += '</div>';

  main.innerHTML = statsHTML + readingsHTML + logCardHTML();
  renderLogBody();
}

// ── Render Topic ──
function renderTopic(topic) {
  const main = document.getElementById('mainContent');
  const d = allData[topic] || [];
  if (!d.length) {
    main.innerHTML = emptyHTML('Belum Ada Data', 'Topic ini belum menerima pesan.');
    return;
  }

  const latest = d[d.length - 1];
  const nKeys  = numericKeys(latest);

  // stats
  let statsHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${topic}</div>
        <div class="page-sub">${d.length} data point terkumpul</div>
      </div>
      <div class="topic-tag">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
        Live
      </div>
    </div>
    <div class="stats-grid">
      <div class="card stat-card">
        <div class="stat-label">Data Points</div>
        <div class="stat-value">${d.length}</div>
        <div class="stat-meta">dari maks 100</div>
      </div>`;

  for (const k of nKeys.slice(0, 3)) {
    const vals = d.map(x => parseFloat(x[k])).filter(v => !isNaN(v));
    const avg  = vals.reduce((a, b) => a + b, 0) / vals.length;
    const { unit } = valueMeta(k, avg);
    statsHTML += `
      <div class="card stat-card">
        <div class="stat-label">Rata-rata ${k}</div>
        <div class="stat-value yellow">${avg.toFixed(1)}<span style="font-size:14px;color:var(--text-dim);font-family:var(--sans)"> ${unit}</span></div>
        <div class="stat-meta">dari ${vals.length} sample</div>
      </div>`;
  }
  statsHTML += '</div>';

  // readings
  let readingsHTML = '<div class="readings-grid">';
  for (const k of nKeys) {
    const v = parseFloat(latest[k]);
    const { cls, unit } = valueMeta(k, v);
    readingsHTML += `
      <div class="card reading-card ${cls}">
        <div class="reading-key">${k}</div>
        <div class="reading-val">${v.toFixed(1)}</div>
        <div class="reading-unit">${unit}</div>
        <div class="reading-time">${latest.received_at || '—'}</div>
      </div>`;
  }
  readingsHTML += '</div>';

  // chart
  const chartHTML = nKeys.length ? `
    <div class="card chart-card">
      <div class="card-header">
        <div class="card-title">Grafik Real-time</div>
        <div class="topic-tag" style="font-size:11px">${topic}</div>
      </div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>` : '';

  main.innerHTML = statsHTML + readingsHTML + chartHTML + logCardHTML();
  renderLogBody();

  if (nKeys.length) setTimeout(() => drawChart(topic, d, nKeys), 50);
}

// ── Chart ──
function drawChart(topic, d, keys) {
  const ctx = document.getElementById('mainChart');
  if (!ctx) return;
  const slice  = d.slice(-30);
  const labels = slice.map(x => {
    const t = x.received_at || '';
    return t.split(',')[1]?.trim() || t.split(' ')[1] || t;
  });
  const palette = ['#2f81f7','#3fb950','#d29922','#f85149','#bc8cff'];
  const datasets = keys.slice(0, 4).map((k, i) => ({
    label: k,
    data: slice.map(x => parseFloat(x[k]) || null),
    borderColor: palette[i],
    backgroundColor: palette[i] + '14',
    borderWidth: 1.5,
    pointRadius: 2,
    pointHoverRadius: 4,
    tension: 0.4,
    fill: true
  }));
  if (charts.main) charts.main.destroy();
  charts.main = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8b949e', font: { family: 'JetBrains Mono', size: 11 }, boxWidth: 12, padding: 16 } }
      },
      scales: {
        x: { ticks: { color: '#484f58', font: { family: 'JetBrains Mono', size: 10 }, maxRotation: 0, maxTicksLimit: 6 }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#484f58', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#21262d' } }
      }
    }
  });
}

// ── Log ──
function addLog(topic, data) {
  const t = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const msg = JSON.stringify(data).substring(0, 60);
  logEntries.unshift({ t, topic, msg });
  if (logEntries.length > 50) logEntries.pop();
  renderLogBody();
}

function logCardHTML() {
  return `
    <div class="card log-card">
      <div class="card-header">
        <div class="card-title">Log MQTT</div>
        <button class="btn-sm" onclick="clearLog()">Bersihkan</button>
      </div>
      <div class="log-body" id="logBody"><div class="log-empty">Belum ada pesan...</div></div>
    </div>`;
}

function renderLogBody() {
  const el = document.getElementById('logBody');
  if (!el) return;
  if (!logEntries.length) {
    el.innerHTML = '<div class="log-empty">Belum ada pesan...</div>';
    return;
  }
  el.innerHTML = logEntries.map(e => `
    <div class="log-row">
      <span class="log-time">${e.t}</span>
      <span class="log-topic">${e.topic}</span>
      <span class="log-msg">${e.msg}</span>
    </div>`).join('');
}

function clearLog() {
  logEntries = [];
  renderLogBody();
}

// ── Helpers ──
function numericKeys(obj) {
  const skip = ['topic','timestamp','timestamp_readable','received_at','raw_message'];
  return Object.keys(obj).filter(k => !skip.includes(k) && !isNaN(parseFloat(obj[k])));
}

function valueMeta(k, v) {
  const key = k.toLowerCase();
  if (key.includes('suhu') || key.includes('temp')) return { cls: 'temp',  unit: '°C' };
  if (key.includes('kelembapan') || key.includes('humid')) return { cls: 'humid', unit: '%' };
  return { cls: 'other', unit: '' };
}

function emptyHTML(title = 'Menunggu Koneksi', sub = 'Pastikan ESP8266 sudah terhubung dan mengirim data ke broker MQTT.') {
  return `<div class="empty">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8.111 16.404a5.5 5.5 0 0 1 7.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.14 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/>
      </svg>
    </div>
    <div class="empty-title">${title}</div>
    <div class="empty-sub">${sub}</div>
  </div>`;
}

// ── Mobile sidebar ──
const hamburger = document.getElementById('hamburgerBtn');
const sidebar   = document.getElementById('sidebar');
const overlay   = document.getElementById('sidebarOverlay');

hamburger.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
});

overlay.addEventListener('click', closeSidebar);

function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
}
</script>
